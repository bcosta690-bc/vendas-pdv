<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vendas PDV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 32px;
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .product-item {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .product-item label {
            color: #555;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .product-item input {
            width: 100%;
        }

        .total-section {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 16px;
            border-radius: 12px;
            margin: 24px 0;
            text-align: center;
            border: 1.5px solid rgba(102, 126, 234, 0.2);
        }

        .total-label {
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .total-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-top: 4px;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: white;
            color: #667eea;
            border: 1.5px solid #667eea;
        }

        .btn-clear:hover {
            background: #f9f9f9;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 20px;
            }

            .buttons {
                grid-template-columns: 1fr;
            }

            .btn-send {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Vendas PDV</h1>
            <p>Registro diário de produtos</p>
        </div>

        <div class="success-message" id="successMessage">
            ✓ Dados enviados com sucesso!
        </div>

        <div class="error-message" id="errorMessage">
            ✗ Erro ao enviar dados. Tente novamente.
        </div>

        <form id="formVendas">
            <div class="form-group">
                <label for="promotora">Nome da Promotora *</label>
                <input 
                    type="text" 
                    id="promotora" 
                    name="promotora"
                    placeholder="Digite seu nome"
                    required
                >
            </div>

            <div class="form-group">
                <label for="data">Data *</label>
                <input 
                    type="date" 
                    id="data" 
                    name="data"
                    required
                >
            </div>

            <div class="form-group">
                <label for="cliente">Cliente do Dia *</label>
                <input 
                    type="text" 
                    id="cliente" 
                    name="cliente"
                    placeholder="Nome do cliente"
                    required
                >
            </div>

            <div class="form-group">
                <label>Produtos Vendidos</label>
                <div class="products-grid">
                    <div class="product-item">
                        <label for="bioExtratus">Bio Extratus (peças)</label>
                        <input 
                            type="number" 
                            id="bioExtratus" 
                            name="bioExtratus"
                            min="0"
                            value="0"
                            placeholder="0"
                        >
                    </div>

                    <div class="product-item">
                        <label for="chikas">Chikas (peças)</label>
                        <input 
                            type="number" 
                            id="chikas" 
                            name="chikas"
                            min="0"
                            value="0"
                            placeholder="0"
                        >
                    </div>

                    <div class="product-item">
                        <label for="coloracoes">Colorações (peças)</label>
                        <input 
                            type="number" 
                            id="coloracoes" 
                            name="coloracoes"
                            min="0"
                            value="0"
                            placeholder="0"
                        >
                    </div>
                </div>
            </div>

            <div class="total-section">
                <div class="total-label">Total de peças vendidas</div>
                <div class="total-value" id="totalPecas">0</div>
            </div>

            <div class="buttons">
                <button type="button" class="btn-clear" onclick="limparFormulario()">Limpar</button>
                <button type="submit" class="btn-send" id="btnEnviar">Enviar</button>
            </div>

            <div class="loading" id="loading">
                <span>Enviando dados...</span>
            </div>
        </form>
    </div>

    <script>
        // Preenche data de hoje por padrão
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('data').value = hoje;

        // Atualiza total de peças em tempo real
        const inputsQuantidade = ['bioExtratus', 'chikas', 'coloracoes'];
        inputsQuantidade.forEach(id => {
            document.getElementById(id).addEventListener('change', atualizarTotal);
            document.getElementById(id).addEventListener('input', atualizarTotal);
        });

        function atualizarTotal() {
            const bio = parseInt(document.getElementById('bioExtratus').value) || 0;
            const chikas = parseInt(document.getElementById('chikas').value) || 0;
            const coloracoes = parseInt(document.getElementById('coloracoes').value) || 0;
            const total = bio + chikas + coloracoes;
            document.getElementById('totalPecas').textContent = total;
        }

        function limparFormulario() {
            document.getElementById('formVendas').reset();
            document.getElementById('data').value = hoje;
            document.getElementById('totalPecas').textContent = '0';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        document.getElementById('formVendas').addEventListener('submit', async function(e) {
            e.preventDefault();

            const promotora = document.getElementById('promotora').value.trim();
            const data = document.getElementById('data').value;
            const cliente = document.getElementById('cliente').value.trim();

            if (!promotora || !data || !cliente) {
                mostrarErro('Preenchimento de todos os campos obrigatórios!');
                return;
            }

            const bioExtratus = parseInt(document.getElementById('bioExtratus').value) || 0;
            const chikas = parseInt(document.getElementById('chikas').value) || 0;
            const coloracoes = parseInt(document.getElementById('coloracoes').value) || 0;

            const dados = {
                promotora,
                data,
                cliente,
                bioExtratus,
                chikas,
                coloracoes,
                total: bioExtratus + chikas + coloracoes,
                horario: new Date().toLocaleTimeString('pt-BR')
            };

            enviarParaGoogleSheets(dados);
        });

        async function enviarParaGoogleSheets(dados) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('btnEnviar').disabled = true;

            try {
                // Google Apps Script Web App URL
                // Substitua pela sua URL do Web App
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbwlETeAPCAOU6ETqk3y4ygVbuFvUqEq-1UXVotx7LtQA5KIQZrYmQ8wDIIxH_USi6pKXg/exec';

                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    mostrarSucesso();
                    document.getElementById('formVendas').reset();
                    document.getElementById('data').value = hoje;
                    document.getElementById('totalPecas').textContent = '0';
                    
                    setTimeout(() => {
                        document.getElementById('successMessage').style.display = 'none';
                    }, 4000);
                } else {
                    mostrarErro('Erro ao enviar dados');
                }
            } catch (error) {
                console.error('Erro:', error);
                mostrarErro('Erro de conexão. Verifique sua internet.');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btnEnviar').disabled = false;
            }
        }

        function mostrarSucesso() {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function mostrarErro(mensagem) {
            document.getElementById('errorMessage').textContent = '✗ ' + mensagem;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
